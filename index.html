<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CodexAILEN Aurora</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0a1a2f, #02040a);
  color:#00ffe5;
  overflow:hidden;
}

/* glow background */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:#00ffe5;
  filter:blur(200px);
  opacity:0.15;
  top:-100px;
  left:-100px;
}

/* app glass */
.app{
  width:900px;
  border-radius:24px;
  padding:18px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(30px);
  border:1px solid rgba(0,255,229,0.2);
  box-shadow:0 0 80px rgba(0,255,229,0.1);
  z-index:2;
}

/* header */
.header{
  font-size:18px;
  font-weight:600;
  margin-bottom:12px;
  letter-spacing:1px;
}

/* chat */
#log{
  height:480px;
  overflow:auto;
  padding:14px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  box-shadow: inset 0 0 40px rgba(0,255,229,0.05);
}

/* messages */
.msg{
  margin:10px 0;
  padding:10px 12px;
  border-radius:14px;
  max-width:80%;
  animation:fade 0.25s ease;
}

.user{
  background:rgba(255,255,255,0.06);
  color:white;
  margin-left:auto;
}

.ai{
  background:rgba(0,255,229,0.07);
}

/* input row */
.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

input{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:transparent;
  border:1px solid #00ffe5;
  color:#00ffe5;
  outline:none;
}

button{
  padding:12px 16px;
  border-radius:14px;
  background:transparent;
  border:1px solid #00ffe5;
  color:#00ffe5;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:rgba(0,255,229,0.1);
}

/* animation */
@keyframes fade{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">
  <div class="header">🧠 CodexAILEN — Aurora Interface</div>

  <div id="log"></div>

  <div class="row">
    <input id="input" placeholder="พิมพ์ความคิดของคุณ..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

let memory = [];

function brain(input){
  memory.push(input);

  let mood = "calm";

  if(input.includes("?")) mood = "thinking";
  if(input.length > 40) mood = "deep processing";
  if(input.includes("!")) mood = "high energy";

  return `
🧠 SYSTEM RESPONSE
------------------
Input: ${input}

State:
- mood: ${mood}
- memory: ${memory.length}

AI: processed successfully
`;
}

function log(text,type="ai"){
  const box=document.getElementById("log");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=(type==="user"?"👤 ":"🧠 ")+text;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function send(){
  const input=document.getElementById("input");
  const value=input.value.trim();
  if(!value) return;

  log(value,"user");

  setTimeout(()=>{
    log(brain(value),"ai");
  },250);

  input.value="";
}

log("🌌 Aurora UI loaded");
log("CodexAILEN ready");

</script>

</body>
</html>

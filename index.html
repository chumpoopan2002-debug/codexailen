<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>CodexAILEN</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b0f1a;
      color: #00ffe5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 600px;
      border: 1px solid #00ffe5;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 0 40px #00ffe520;
    }

    #log {
      height: 300px;
      overflow-y: auto;
      background: #00000070;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    input {
      width: 75%;
      padding: 10px;
      background: transparent;
      border: 1px solid #00ffe5;
      color: #00ffe5;
    }

    button {
      padding: 10px;
      border: 1px solid #00ffe5;
      background: transparent;
      color: #00ffe5;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h3>🧠 CodexAILEN</h3>

  <div id="log"></div>

  <input id="input" placeholder="พิมพ์อะไรสักอย่าง..." />
  <button onclick="send()">Send</button>
</div>

<script>
let memory = [];

function log(text) {
  const box = document.getElementById("log");
  const div = document.createElement("div");
  div.innerText = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function brain(input) {
  if (input.includes("?")) {
    return "🧠 วิเคราะห์คำถาม → กำลังคิด...";
  }

  if (input.length > 20) {
    return "📊 ข้อมูลยาว → วิเคราะห์เชิงลึก";
  }

  return "📌 รับข้อมูลแล้ว: " + input;
}

function send() {
  const input = document.getElementById("input");
  const value = input.value.trim();

  if (!value) return;

  log("👤 " + value);

  memory.push(value);

  const response = brain(value);

  setTimeout(() => {
    log("🧠 " + response);
  }, 300);

  input.value = "";
}
</script>

</body>
</html>
